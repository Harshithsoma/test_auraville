<svg width="1440" height="1560" viewBox="0 0 1440 1560" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1440" height="1560" fill="#E7F7EA"/>
  <circle cx="1140" cy="286" r="214" fill="#D8AA2F"/>
  <circle cx="1232" cy="416" r="166" fill="#C84F43"/>
  <circle cx="1012" cy="444" r="178" fill="#347A4F"/>

  <rect x="92" y="122" width="1256" height="650" rx="56" fill="#FFFFFF"/>
  <text x="152" y="224" fill="#173D2A" font-family="Avenir Next, Arial, sans-serif" font-size="30" font-weight="600" letter-spacing="1.8">WHY AURAVILLE</text>
  <text x="152" y="318" fill="#15231B" font-family="Avenir Next, Arial, sans-serif" font-size="60" font-weight="600">Rooted in palmyra,</text>
  <text x="152" y="388" fill="#15231B" font-family="Avenir Next, Arial, sans-serif" font-size="60" font-weight="600">made for modern Indian wellness.</text>

  <text x="152" y="478" fill="#415346" font-family="Avenir Next, Arial, sans-serif" font-size="31" font-weight="500">
    Auraville began with one simple belief: daily nutrition should feel
  </text>
  <text x="152" y="524" fill="#415346" font-family="Avenir Next, Arial, sans-serif" font-size="31" font-weight="500">
    natural, trustworthy, and easy to live with.
  </text>
  <text x="152" y="584" fill="#415346" font-family="Avenir Next, Arial, sans-serif" font-size="31" font-weight="500">
    We start with palmyra sprout, then pair it with familiar Indian ingredients
  </text>
  <text x="152" y="630" fill="#415346" font-family="Avenir Next, Arial, sans-serif" font-size="31" font-weight="500">
    like nuts, grains, seeds, and jaggery.
  </text>
  <text x="152" y="690" fill="#415346" font-family="Avenir Next, Arial, sans-serif" font-size="31" font-weight="500">
    No unnecessary additives. No noisy labels. Just thoughtful food made right.
  </text>

  <rect x="92" y="838" width="1256" height="610" rx="56" fill="#FFFFFF"/>
  <text x="152" y="944" fill="#173D2A" font-family="Avenir Next, Arial, sans-serif" font-size="30" font-weight="600" letter-spacing="1.8">THE AURAVILLE PROMISE</text>
  <text x="152" y="1032" fill="#15231B" font-family="Avenir Next, Arial, sans-serif" font-size="50" font-weight="600">
    Palmyra sprout-first recipes.
  </text>
  <text x="152" y="1092" fill="#15231B" font-family="Avenir Next, Arial, sans-serif" font-size="50" font-weight="600">
    Clean everyday nutrition.
  </text>
  <text x="152" y="1152" fill="#15231B" font-family="Avenir Next, Arial, sans-serif" font-size="50" font-weight="600">
    Indian-rooted taste and trust.
  </text>

  <text x="152" y="1238" fill="#415346" font-family="Avenir Next, Arial, sans-serif" font-size="31" font-weight="500">
    From your first bite to your family shelf, Auraville is built for
  </text>
  <text x="152" y="1284" fill="#415346" font-family="Avenir Next, Arial, sans-serif" font-size="31" font-weight="500">
    steady energy, simple labels, and everyday confidence.
  </text>

  <circle cx="1098" cy="1122" r="186" fill="#173D2A"/>
  <circle cx="1098" cy="1122" r="138" fill="#F7FFF8"/>
  <circle cx="1098" cy="1122" r="84" fill="#347A4F"/>
  <path d="M1054 1122C1072 1100 1122 1100 1140 1122C1122 1144 1072 1144 1054 1122Z" fill="#D8AA2F"/>
</svg>
